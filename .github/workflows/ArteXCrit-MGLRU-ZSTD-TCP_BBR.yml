name: Build ArteXCrit Kernel Daily+

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk flex bison openssl libssl-dev dkms libelf-dev libudev-dev libpci-dev libiberty-dev autoconf llvm lld clang git bc rsync ccache curl zip

    - name: Send Tele - Build Started
      run: |
        TEXT="🚀 *ArteXCrit Kernel Build Started\!*
        • *Varian:* Daily+ Ultimate Tweaks
        • *Compiler:* Clang 22
        • *Triggered by:* $GITHUB_ACTOR"
        curl -s -X POST "https://api.telegram.org/bot8912165324:AAFzwMIB-kea9ICh5l3XKbd4E-6To2Dou9w/sendMessage" \
          -d "chat_id=@archivenyamasagung" \
          -d "text=${TEXT}" \
          -d "parse_mode=MarkdownV2"

    - name: Clone Sources & Google Toolchain
      run: |
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8450.git -b lineage-23.2 kernel-src
        mkdir -p toolchain/aosp-clang
        cd toolchain/aosp-clang
        curl -LO https://github.com/AbuRider/scripts/releases/download/20260502/clang-r596125.tar.gz
        tar -xf clang-r596125.tar.gz && rm clang-r596125.tar.gz
        
        mkdir -p bin
        ln -sf ld.lld bin/aarch64-linux-android-ld
        ln -sf ld.lld bin/aarch64-linux-gnu-ld
        cd ../..
        
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b main --depth=1 gcc-64
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b main --depth=1 gcc-32

    - name: Customization Name & Advanced Tweaks
      run: |
        cd kernel-src
        # 1. Ganti nama lokal kernel harian
        sed -i 's/CONFIG_LOCALVERSION="-gki"/CONFIG_LOCALVERSION="-5.10-ArteXCrit-Clang22-ThinLTO-KernelDaily+"/g' arch/arm64/configs/gki_defconfig
        
        # 2. Set Thin LTO (Diet RAM Server)
        sed -i 's/CONFIG_LTO_CLANG_FULL=y/# CONFIG_LTO_CLANG_FULL is not set/g' arch/arm64/configs/gki_defconfig
        echo "CONFIG_LTO_CLANG_THIN=y" >> arch/arm64/configs/gki_defconfig
        
        # 3. Matikan perlindungan stack di level defconfig (Fix Undefined __stack_chk_guard)
        sed -i 's/CONFIG_STACKPROTECTOR=y/# CONFIG_STACKPROTECTOR is not set/g' arch/arm64/configs/gki_defconfig
        sed -i 's/CONFIG_STACKPROTECTOR_STRONG=y/# CONFIG_STACKPROTECTOR_STRONG is not set/g' arch/arm64/configs/gki_defconfig
        echo "CONFIG_STACKPROTECTOR_NONE=y" >> arch/arm64/configs/gki_defconfig

        # =========================================================
        # 🔥 MODIFIKASI OPTIMALISASI KOMUNITAS (ULTIMATE TWEAKS) 🔥
        # =========================================================
        
        # [A] MANAJEMEN MEMORI & RAM (MGLRU & ZRAM ZSTD)
        echo "CONFIG_LRU_GEN=y" >> arch/arm64/configs/gki_defconfig
        echo "CONFIG_LRU_GEN_ENABLED=y" >> arch/arm64/configs/gki_defconfig
        echo "CONFIG_CRYPTO_ZSTD=y" >> arch/arm64/configs/gki_defconfig
        echo "CONFIG_ZRAM_COMP_ALGORITHM_ZSTD=y" >> arch/arm64/configs/gki_defconfig

        # [B] OPTIMASI JARINGAN & PING GAME (TCP BBR)
        echo "CONFIG_TCP_CONG_BBR=y" >> arch/arm64/configs/gki_defconfig
        sed -i 's/CONFIG_DEFAULT_TCP_CONG="cubic"/CONFIG_DEFAULT_TCP_CONG="bbr"/g' arch/arm64/configs/gki_defconfig

        # [C] OPTIMASI I/O SCHEDULER
        echo "CONFIG_MQ_IOSCHED_DEADLINE=y" >> arch/arm64/configs/gki_defconfig

        # [D] PEMBATASAN LOG / DISABLE DEBUG (MENGURANGI BEBAN CPU)
        sed -i 's/CONFIG_PANIC_ON_OOPS=y/CONFIG_PANIC_ON_OOPS=n/g' arch/arm64/configs/gki_defconfig
        sed -i 's/CONFIG_DEBUG_MISC=y/# CONFIG_DEBUG_MISC is not set/g' arch/arm64/configs/gki_defconfig
        echo "CONFIG_SCHED_DEBUG=n" >> arch/arm64/configs/gki_defconfig

    - name: Compilation Kernel
      id: compile
      run: |
        cd kernel-src
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH="$GITHUB_WORKSPACE/toolchain/aosp-clang/bin:$GITHUB_WORKSPACE/toolchain/gcc-64/bin:$GITHUB_WORKSPACE/toolchain/gcc-32/bin:$PATH"
        
        export CC=clang
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_COMPAT=arm-linux-androideabi-
        
        export KCFLAGS="-fno-stack-protector -Wno-error -Wno-implicit-function-declaration -Wno-incompatible-pointer-types -Wno-strict-prototypes -Wno-everything"
        
        make clean && make mrproper
        make O=out LLVM=1 LLVM_IAS=1 gki_defconfig
        make O=out LLVM=1 LLVM_IAS=1 CONFIG_STACKPROTECTOR=n CONFIG_STACKPROTECTOR_STRONG=n -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        if [ -f "kernel-src/out/arch/arm64/boot/Image" ]; then
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel
          
          # Salin Image asli bawaan build
          cp kernel-src/out/arch/arm64/boot/Image AnyKernel/
          # Duplikasi Image menjadi file bernama 'kernel' (Wajib demi kecocokan installer ROM kamu)
          cp kernel-src/out/arch/arm64/boot/Image AnyKernel/kernel
          
          cd AnyKernel
          # Set properti nama perangkat POCO F5 secara resmi agar lolos sensor
          sed -i 's/device.name1=maguro/device.name1=marble/g' anykernel.sh
          sed -i 's/device.name2=toro/device.name2=marblein/g' anykernel.sh
          sed -i 's/device.name3=toroplus/device.name3=/g' anykernel.sh
          sed -i 's/device.name4=tuna/device.name4=/g' anykernel.sh
          
          # Konfigurasi nama teks info kernel harian
          sed -i 's/kernel.string=.*/kernel.string=5.10-ArteXCrit-Clang22-ThinLTO-KernelDaily+/g' anykernel.sh
          
          # CLEANING TOTAL: Buang baris contoh bawaan Galaxy Nexus agar tidak eror partition
          # Menyesuaikan juga perubahan ke huruf kapital penuh (BLOCK, RAMDISK) demi sinkronisasi backend baru
          sed -i '/# boot install/,/## end boot install/c\# boot install\nsplit_boot;\nflash_boot;\n## end boot install' anykernel.sh
          sed -i 's/block=boot;/BLOCK=boot;/g' anykernel.sh
          sed -i 's/\$ramdisk/\$RAMDISK/g' anykernel.sh
          
          zip -r9 "../5.10-ArteXCrit-Clang22-ThinLTO-KernelDaily+.zip" * -x .git* README.md
        else
          echo "Kompilasi gagal! Berkas Image tidak terbentuk."
          exit 1
        fi

    - name: Upload Flashable Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: 5.10-ArteXCrit-Clang22-ThinLTO-KernelDaily+
        path: 5.10-ArteXCrit-Clang22-ThinLTO-KernelDaily+.zip

    - name: Send Tele - Build Success
      if: success()
      run: |
        TEXT="✅ *ArteXCrit Kernel Build SUCCESS\!*
        • *File:* \`5.10-ArteXCrit-Clang22-ThinLTO-KernelDaily+.zip\`
        • Varian ThinLTO + Ultimate Tweaks (Skema Kapital Partisi) berhasil dirakit\."
        
        curl -s -X POST "https://api.telegram.org/bot8912165324:AAFzwMIB-kea9ICh5l3XKbd4E-6To2Dou9w/sendMessage" \
          -d "chat_id=@archivenyamasagung" \
          -d "text=${TEXT}" \
          -d "parse_mode=MarkdownV2"
          
        curl -F chat_id="@archivenyamasagung" -F document=@"5.10-ArteXCrit-Clang22-ThinLTO-KernelDaily+.zip" "https://api.telegram.org/bot8912165324:AAFzwMIB-kea9ICh5l3XKbd4E-6To2Dou9w/sendDocument"

    - name: Send Tele - Build Failed
      if: failure()
      run: |
        TEXT="❌ *ArteXCrit Kernel Build FAILED\!*
        Terjadi kesalahan saat kompilasi varian Ultimate Tweaks\. Silakan periksa tab Actions GitHub untuk melihat log error lengkap\."
        curl -s -X POST "https://api.telegram.org/bot8912165324:AAFzwMIB-kea9ICh5l3XKbd4E-6To2Dou9w/sendMessage" \
          -d "chat_id=@archivenyamasagung" \
          -d "text=${TEXT}" \
          -d "parse_mode=MarkdownV2"
          
