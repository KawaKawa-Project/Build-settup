name: Build ArteXCrit Kernel for Poco F5 (Marble) - A16

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      KERNEL_NAME: "ArteXCrit-Clang22-ThinLTO"
      DEVICE: "marble"
      KERNEL_REPO: "https://github.com/LineageOS/android_kernel_xiaomi_sm8450.git"
      KERNEL_BRANCH: "lineage-23.2" # Branch untuk Android 16
      DEVICE_TREE_REPO: "https://github.com/LineageOS/android_device_xiaomi_sm8450-common.git"
      DEVICE_TREE_BRANCH: "lineage-23.2" # Branch device tree untuk A16
      ANYKERNEL_REPO: "https://github.com/pavelc4-playground/AnyKernel3.git"
      CLANG_VERSION: "r584948b" # Clang dari AOSP 14/15 biasanya kompatibel
      TELEGRAM_TOKEN: "8912165324:AAFzwMIB-kea9ICh5l3XKbd4E-6To2Dou9w"
      TELEGRAM_CHAT_ID: "7127548846"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python3-pip python-is-python3 libelf-dev dwarves

      - name: Initialize and Sync Kernel Source
        run: |
          mkdir -p ~/kernel_build && cd ~/kernel_build
          
          # Clone Kernel Source dengan branch lineage-23.2
          git clone $KERNEL_REPO -b $KERNEL_BRANCH --depth=1 kernel_source
          
          # Clone Device Tree Common
          mkdir -p device/xiaomi/sm8450-common
          git clone $DEVICE_TREE_REPO -b $DEVICE_TREE_BRANCH --depth=1 device/xiaomi/sm8450-common

      - name: Download Clang Toolchain
        run: |
          cd ~/kernel_build
          # Menggunakan prebuilts clang dari branch android-14.0.0_r1 atau android-15.0.0_r1 jika tersedia
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android-14.0.0_r1 --depth=1 clang_prebuilts

      - name: Prepare Build Script
        run: |
          cp $GITHUB_WORKSPACE/build.sh ~/kernel_build/kernel_source/build.sh
          chmod +x ~/kernel_build/kernel_source/build.sh

      - name: Build Kernel with ThinLTO
        working-directory: ~/kernel_build/kernel_source
        run: |
          export PATH=$HOME/kernel_build/clang_prebuilts/clang-${{ env.CLANG_VERSION }}/bin:$PATH
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          
          # Paksa ThinLTO
          export KCFLAGS="-flto=thin -mno-outline-atomics"

          # Jalankan build script
          ./build.sh -z $DEVICE

      - name: Package with AnyKernel3
        if: success()
        run: |
          cd ~/kernel_build
          git clone $ANYKERNEL_REPO --depth=1 AnyKernel3
          
          # Copy hasil build ke folder AnyKernel3
          cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          cp kernel_source/out/arch/arm64/boot/dtbo.img AnyKernel3/ || true
          
          cd AnyKernel3
          zip -r9 ../${{ env.KERNEL_NAME }}-${{ env.DEVICE }}.zip * -x .git README.md LICENSE

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_NAME }}-${{ env.DEVICE }}
          path: |
            ~/kernel_build/${{ env.KERNEL_NAME }}-${{ env.DEVICE }}.zip
            ~/kernel_build/kernel_source/compile.log

      - name: Notify Telegram on Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.TELEGRAM_CHAT_ID }}
          token: ${{ env.TELEGRAM_TOKEN }}
          message: |
            ✅ **BUILD SUCCESSFUL!**
            
            📱 Device: ${{ env.DEVICE }}
            🔥 Kernel: ${{ env.KERNEL_NAME }}
            🌿 Branch: ${{ env.KERNEL_BRANCH }}
            
            Build completed successfully. Check artifacts for the flashable ZIP.

      - name: Notify Telegram on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.TELEGRAM_CHAT_ID }}
          token: ${{ env.TELEGRAM_TOKEN }}
          message: |
            ❌ **BUILD FAILED!**
            
            📱 Device: ${{ env.DEVICE }}
            🔥 Kernel: ${{ env.KERNEL_NAME }}
            🌿 Branch: ${{ env.KERNEL_BRANCH }}
            
            Please check the GitHub Actions logs for details.
