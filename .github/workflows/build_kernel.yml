name: Build ArteCrit Kernel

on:
  workflow_dispatch: # Memperbolehkan kamu klik "Run workflow" manual dari web GitHub

env:
  TG_TOKEN: "8912165324:AAFzwMIB-kea9ICh5l3XKbd4E-6To2Dou9w"
  TG_CHAT_ID: "7127548846"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk flex bison openssl libssl-dev dkms libelf-dev libudev-dev libpci-dev libiberty-dev autoconf llvm lld clang git bc rsync ccache curl zip

    - name: Send TG Notification (Start)
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage" \
        -d "chat_id=${{ env.TG_CHAT_ID }}" \
        -d "text=🚀 <b>[ArteCrit Kernel]</b>%0AProses build dimulai di GitHub Actions!%0AMenyiapkan source..." \
        -d "parse_mode=html"

    - name: Clone Sources & Toolchain
      run: |
        # Clone Kernel Tree
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8450.git -b lineage-23.2 kernel-src
        
        # Download XClang via Curl
        mkdir -p toolchain/xclang
        cd toolchain/xclang
        curl -L -o XClang-21-ThinLTO.tar.gz https://github.com/Xtra-Manager-Software/XClang-Binaries/releases/download/xclanglto-thin-21.1.8/XClang-21-ThinLTO.tar.gz
        tar -xf XClang-21-ThinLTO.tar.gz && rm XClang-21-ThinLTO.tar.gz
        
        # Clone SUSFS & ReSukiSU
        cd ../..
        git clone https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
        git clone https://github.com/ReSukiSU/ReSukiSU.git ReSukiSU

    - name: Apply Patches & Customization
      run: |
        cd kernel-src
        
        # Patch ReSukiSU (KernelSU Reborn/Next Module)
        mkdir -p drivers/kernelsu
        cp -r ../ReSukiSU/kernel/* drivers/kernelsu/
        if ! grep -q "CONFIG_KSU" drivers/Makefile; then
            echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
        fi
        
        # Patch SUSFS v5.10 (Mencari file patch secara fleksibel agar anti-error)
        echo "Mencari dan menyalin patch SUSFS..."
        find ../susfs4ksu/Kernel_Patches/ -type f -name "*5.10*.patch" -exec cp {} . \; 2>/dev/null || true
        find ../susfs4ksu/Kernel_Patches/ -type f -name "*add_susfs*.patch" -exec cp {} . \; 2>/dev/null || true
        find ../susfs4ksu/Kernel_Patches/ -type f -name "*ext4*.patch" -exec cp {} . \; 2>/dev/null || true
        
        # Aplikasikan semua patch .patch yang berhasil disalin
        for patch in *.patch; do
            if [ -f "$patch" ]; then
                echo "Mengaplikasikan patch: $patch"
                git apply "$patch" --whitespace=nowarn || echo "Gagal mengaplikasikan $patch, dilewati..."
            fi
        done
        
        # Salin file driver utama SUSFS ke filesystem kernel
        cp ../susfs4ksu/fs/susfs.c fs/ || echo "Gagal salin susfs.c"
        cp ../susfs4ksu/include/linux/susfs.h include/linux/ || echo "Gagal salin susfs.h"
        
        # Custom Nama Kernel ke -ArteCrit-XClang-LTO
        sed -i 's/CONFIG_LOCALVERSION="-gki"/CONFIG_LOCALVERSION="-ArteCrit-XClang-LTO"/g' arch/arm64/configs/gki_defconfig
        
        # Inject Konfigurasi ReSukiSU & SUSFS di bagian bawah gki_defconfig
        cat <<EOF >> arch/arm64/configs/gki_defconfig

# ReSukiSU & SUSFS Configs
CONFIG_KSU=y
CONFIG_SUSFS=y
CONFIG_SUSFS_SHOW_SUS_PATH=y
CONFIG_SUSFS_SUS_MOUNT=y
CONFIG_SUSFS_SUS_KSTAT=y
CONFIG_SUSFS_TRY_UMOUNT=y
CONFIG_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
EOF

    - name: Compilation Kernel
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage" \
        -d "chat_id=${{ env.TG_CHAT_ID }}" \
        -d "text=⚙️ <b>[ArteCrit Kernel]</b>%0AMemulai kompilasi dengan XClang LTO..." \
        -d "parse_mode=html"
        
        cd kernel-src
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH="$GITHUB_WORKSPACE/toolchain/xclang/bin:$PATH"
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
        
        make clean && make mrproper
        make O=out gki_defconfig
        make O=out -j$(nproc)

    - name: Check Build & Package with AnyKernel3
      run: |
        if [ -f "kernel-src/out/arch/arm64/boot/Image" ]; then
          curl -s -X POST "https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage" -d "chat_id=${{ env.TG_CHAT_ID }}" -d "text=📦 <b>[ArteCrit Kernel]</b>%0ABuild sukses! Sedang mengemas kernel ke AnyKernel3 (init_boot GKI)..." -d "parse_mode=html"
          
          # Clone AnyKernel3 Resmi
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel
          
          # Masukkan file Image hasil compile ke folder AnyKernel
          cp kernel-src/out/arch/arm64/boot/Image AnyKernel/
          
          # Modifikasi otomatis anykernel.sh untuk GKI POCO F5 (Target partisi init_boot)
          cd AnyKernel
          sed -i 's/kernel.string=.*/kernel.string=ArteCrit-XClang-LTO/g' anykernel.sh
          sed -i 's/block=boot;/block=init_boot;/g' anykernel.sh
          sed -i 's/#dump_boot;/dump_boot;/g' anykernel.sh
          sed -i 's/#write_boot;/write_boot;/g' anykernel.sh
          
          # Buat file zip flashable
          zip -r9 "../ArteCrit-XClang-LTO-marble.zip" * -x .git* README.md
          
        else
          curl -s -X POST "https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage" -d "chat_id=${{ env.TG_CHAT_ID }}" -d "text=❌ <b>BUILD GAGAL!</b>%0AProses kompilasi kernel mengalami error." -d "parse_mode=html"
          exit 1
        fi

    - name: Upload Flashable Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: ArteCrit-Kernel-Flashable
        path: ArteCrit-XClang-LTO-marble.zip

    - name: Send Final Telegram Notification
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage" \
        -d "chat_id=${{ env.TG_CHAT_ID }}" \
        -d "text=✅ <b>KERNEL ZIP SIAP DI-FLASH!</b>%0A%0A📦 <b>File:</b> ArteCrit-XClang-LTO-marble.zip%0A📱 <b>Device:</b> POCO F5 (marble)%0A🔥 <b>Features:</b> ReSukiSU + SUSFS%0A%0ASilakan unduh file zip langsung di halaman GitHub Actions repositori kamu." \
        -d "parse_mode=html"
        
