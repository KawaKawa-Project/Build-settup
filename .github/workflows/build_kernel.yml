name: Build ArteCrit Kernel

on:
  workflow_dispatch: # Memperbolehkan kamu klik "Run workflow" manual dari web GitHub

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk flex bison openssl libssl-dev dkms libelf-dev libudev-dev libpci-dev libiberty-dev autoconf llvm lld clang git bc rsync ccache curl zip

    - name: Clone Sources & Google Toolchain
      run: |
        # Clone Kernel Tree POCO F5 (marble)
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8450.git -b lineage-23.2 kernel-src
        
        # Download AOSP Clang 22 Resmi dari Google Prebuilts Git (seri r584948)
        mkdir -p toolchain/aosp-clang
        curl -fLo toolchain/aosp-clang/clang-r584948.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r584948.tar.gz"
        
        # Ekstraksi dengan aman
        cd toolchain/aosp-clang
        tar -xf clang-r584948.tar.gz && rm clang-r584948.tar.gz
        
        # FIX AMAN: Buat symlink langsung menggunakan full path absolut tanpa perlu pindah direktori manual
        mkdir -p bin
        ln -sf ld.lld bin/aarch64-linux-android-ld
        ln -sf ld.lld bin/aarch64-linux-gnu-ld
        cd ../..
        
        # Download AOSP GCC Cross Compilers (Untuk binutils lama yang masih dibutuhkan kernel 5.10)
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b main --depth=1 gcc-64
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b main --depth=1 gcc-32

    - name: Customization Name
      run: |
        cd kernel-src
        # Mengubah nama versi kernel sesuai permintaan
        sed -i 's/CONFIG_LOCALVERSION="-gki"/CONFIG_LOCALVERSION="-5.10-ArteXCrit-Clang22-LTO"/g' arch/arm64/configs/gki_defconfig

    - name: Compilation Kernel
      run: |
        cd kernel-src
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Satukan semua path toolchain ke environment PATH resmi
        export PATH="$GITHUB_WORKSPACE/toolchain/aosp-clang/bin:$GITHUB_WORKSPACE/toolchain/gcc-64/bin:$GITHUB_WORKSPACE/toolchain/gcc-32/bin:$PATH"
        
        # Setup parameter build utama untuk Google Clang
        export CC=clang
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_COMPAT=arm-linux-androideabi-
        
        # JALUR AMAN: Memaksa Clang 22 agar mengabaikan error ketatnya regulasi sintaks baru pada kode lama
        export KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-incompatible-pointer-types -Wno-strict-prototypes -Wno-everything"
        
        # Bersihkan sisa objek lama
        make clean && make mrproper
        
        # Buat konfigurasi defconfig asli
        make O=out gki_defconfig
        
        # Eksekusi kompilasi dengan bendera LLVM penuh sesuai standar Google
        make O=out LLVM=1 LLVM_IAS=1 -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        if [ -f "kernel-src/out/arch/arm64/boot/Image" ]; then
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel
          cp kernel-src/out/arch/arm64/boot/Image AnyKernel/
          
          cd AnyKernel
          sed -i 's/kernel.string=.*/kernel.string=5.10-ArteXCrit-Clang22-LTO/g' anykernel.sh
          sed -i 's/block=boot;/block=init_boot;/g' anykernel.sh
          sed -i 's/#dump_boot;/dump_boot;/g' anykernel.sh
          sed -i 's/#write_boot;/write_boot;/g' anykernel.sh
          
          zip -r9 "../5.10-ArteXCrit-Clang22-LTO-marble.zip" * -x .git* README.md
        else
          echo "Kompilasi gagal! Berkas Image tidak terbentuk."
          exit 1
        fi

    - name: Upload Flashable Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: 5.10-ArteXCrit-Clang22-LTO-Kernel
        path: 5.10-ArteXCrit-Clang22-LTO-marble.zip
        
